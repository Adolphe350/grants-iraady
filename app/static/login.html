<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grants Hub | Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a56db,#0d3b8e);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .box{background:white;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
  .logo{font-size:3rem;margin-bottom:12px}
  h1{color:#1a202c;font-size:1.5rem;margin-bottom:6px}
  p{color:#718096;font-size:.9rem;margin-bottom:32px}
  input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;outline:none;margin-bottom:16px;transition:border .2s}
  input:focus{border-color:#1a56db}
  button{width:100%;padding:14px;background:#1a56db;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
  button:hover{background:#1048c2}
  .error{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.88rem}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🌍</div>
  <h1>Grants Hub</h1>
  <p>Uwezo Youth Empowerment<br>Enter password to access</p>
  <!--ERROR-->
  <form method="POST" action="/login">
    <input type="password" name="password" placeholder="Enter password..." autofocus required>
    <button type="submit">Access Grants →</button>
  </form>
</div>
</body>
</html>
